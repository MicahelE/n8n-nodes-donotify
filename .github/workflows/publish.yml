name: Publish to npm

# Publishes the package to npm with a provenance attestation whenever a version
# tag (e.g. v0.1.0) is pushed. Provenance + GitHub Actions publishing is required
# for n8n verified community nodes (since 2026-05-01).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm run build

      - run: npm run lint

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
